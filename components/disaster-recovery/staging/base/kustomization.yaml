apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: konflux-disaster-recovery

resources:
- ../../development/
- cronjob.yaml
- event_listener.yaml
- localqueue.yaml
- networkpolicy_allow_el_from_ns.yaml
- rbac-pipeline.yaml
- rbac-triggers.yaml
- triggerbinding.yaml
- triggertemplate.yaml

patches:
  - path: patch_cronjob_suspend.yaml
    target:
      kind: CronJob
      name: run-disaster-recovery-pipelinerun
      group: batch
      version: v1
      namespace: konflux-disaster-recovery
