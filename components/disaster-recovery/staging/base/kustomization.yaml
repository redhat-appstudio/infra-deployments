apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../development/
patches:
  - path: patch_cronjob_suspend.yaml
    target:
      kind: CronJob
      name: run-disaster-recovery-pipelinerun
      group: batch
      version: v1
      namespace: konflux-disaster-recovery
