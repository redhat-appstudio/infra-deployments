---
loki:
  limits_config:
    max_query_length: 0
  auth_enabled: true
  basic_auth:
    enabled: true
    existingSecret: loki-basic-auth
  storage:
    type: s3
    bucketNames:
      chunks: stone-stg-rh01-loki-storage
      ruler: stone-stg-rh01-loki-storage
      admin: stone-stg-rh01-loki-storage
    s3:
      region: us-east-1
      type: "aws_s3"
      bucketNames:
        chunks: loki
        ruler: loki-ruler
        admin: loki-admin

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  commonConfig:
    replication_factor: 1

  compactor:
    retention_enabled: true
    delete_request_store: s3
  ruler:
    storage:
      type: local
      local:
        directory: /tmp/rules

deploymentMode: SingleBinary

# Configure ServiceAccount for Loki
serviceAccount:
  create: false  # We create it manually in loki-pre.yaml
  name: loki-sa

singleBinary:
  replicas: 1
  persistence:
    enabled: false
  extraVolumeMounts:
    - name: loki-storage
      mountPath: /var/loki
  extraVolumes:
    - name: loki-storage
      emptyDir: {}

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
