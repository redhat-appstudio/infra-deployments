---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubearchive-logging-rules
  namespace: product-kubearchive-logging
  labels:
    openshift.io/prometheus-rule-evaluation-scope: leaf-prometheus
spec:
  groups:
  - name: loki
    interval: 30s
    rules:
    - alert: LokiDown
      expr: up{namespace="product-kubearchive-logging",job=~"loki-ingester.*"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Loki component {{ $labels.job }} is down"
        description: "{{ $labels.job }} has been down for more than 5 minutes"
    - alert: LokiHighRequestLatency
      expr: |
        histogram_quantile(0.99,
          rate(loki_request_duration_seconds_bucket{namespace="product-kubearchive-logging"}[5m])
        ) > 10
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Loki high request latency"
        description: "99th percentile latency is {{ $value }}s"
    - alert: LokiIngestionFailure
      expr: |
        rate(loki_request_duration_seconds_count{
          namespace="product-kubearchive-logging",
          status_code!~"2..",
          route=~".*push.*"
        }[5m]) > 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Loki ingestion failures detected"
        description: "Ingestion error rate is {{ $value }} per second"

