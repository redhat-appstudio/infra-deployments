- op: replace
  path: /spec/endpoints/0/scheme
  value: http
- op: replace
  path: /spec/endpoints/0/port
  value: http-metrics
- op: replace
  path: /spec/selector/matchExpressions
  value:
  - key: app.kubernetes.io/component
    operator: In
    values:
    - querier
    - ingester
    - distributor
    - compactor
  - key: app.kubernetes.io/name
    operator: In
    values:
    - loki
