---
# OpenShift-compatible security context using assigned UID range
securityContext:
  runAsNonRoot: true
  runAsUser: 1000770000
  runAsGroup: 1000770000
  fsGroup: 1000770000

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000770000
  runAsGroup: 1000770000
  fsGroup: 1000770000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000770000
  runAsGroup: 1000770000

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.grafana-loki.svc.cluster.local:3100
        basicAuth: true
        basicAuthUser: $LOKI_USER
        secureJsonData:
          basicAuthPassword: $LOKI_PWD
          httpHeaderValue1: my-tenant-id
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
          httpMethod: "GET"
        isDefault: true
        editable: true
sidecar:
  datasources:
    envValueFrom:
      LOKI_USER:
        secretKeyRef:
          name: kubearchive-loki
          key: username
      LOKI_PWD:
        secretKeyRef:
          name: kubearchive-loki
          key: password
