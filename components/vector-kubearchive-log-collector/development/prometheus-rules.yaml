---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubearchive-logging-rules
  namespace: product-kubearchive-logging
  labels:
    openshift.io/prometheus-rule-evaluation-scope: leaf-prometheus
spec:
  groups:
  - name: loki
    interval: 30s
    rules:
    - alert: LokiComponentDown
      expr: up{namespace="product-kubearchive-logging",job=~"loki-(ingester|distributor|querier|compactor).*"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Loki component {{ $labels.job }} is down"
        description: "{{ $labels.job }} has been down for more than 5 minutes"
    - alert: LokiHighRequestLatency
      expr: |
        histogram_quantile(0.99,
          rate(loki_request_duration_seconds_bucket{namespace="product-kubearchive-logging"}[5m])
        ) > 10
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Loki high request latency"
        description: "99th percentile latency is {{ $value }}s"
    - alert: LokiIngestionFailure
      expr: |
        100 * sum(rate(loki_request_duration_seconds_count{
          namespace="product-kubearchive-logging",
          status_code=~"5..",
          route=~".*push.*"
        }[5m])) by (job)
        /
        sum(rate(loki_request_duration_seconds_count{
          namespace="product-kubearchive-logging",
          route=~".*push.*"
        }[5m])) by (job)
        > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Loki ingestion failures detected"
        description: "{{ $labels.job }} push error rate is {{ $value | printf \"%.1f\" }}%"
