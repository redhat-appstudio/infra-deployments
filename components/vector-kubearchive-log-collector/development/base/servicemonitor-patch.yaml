---
# Patch ServiceMonitor for development environment
# Changes HTTPS with auth to HTTP without auth
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: product-kubearchive-logging-monitor
  namespace: product-kubearchive-logging
spec:
  endpoints:
  - path: /metrics
    port: http-metrics
    scheme: http
  selector:
    matchExpressions:
    - key: app.kubernetes.io/component
      operator: In
      values:
      - querier
      - ingester
      - distributor
      - compactor
    - key: app.kubernetes.io/name
      operator: In
      values:
      - loki
