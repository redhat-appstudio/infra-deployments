---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: etcd-shield
  namespace: etcd-shield
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: etcd-shield
subjects:
- apiGroup: ""
  kind: ServiceAccount
  name: etcd-shield
  namespace: etcd-shield
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: etcd-shield
---
