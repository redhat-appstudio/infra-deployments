apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openshift-adp

resources:
  - namespace.yaml
  - ../../base/all-clusters/oadp
  - backup-s3-credentials.yaml
  - minio-storage-configuration.yaml
  - minio-tenant.yaml
  - minio-create-bucket-job.yaml
  - backup-tenants-schedule.yaml

patches:
  - path: dpa-minio-patch.yaml
    target:
      group: oadp.openshift.io
      version: v1alpha1
      kind: DataProtectionApplication
      name: velero-aws
