# Deployment-agnostic patch: applied to any Deployment that has an initContainer
# named "mc" via a `target:` selector in kustomization.yaml. The
# metadata.name below is a placeholder required by kustomize to parse the
# patch; it is not used for matching when a `target:` selector is set.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: placeholder
spec:
  template:
    spec:
      initContainers:
      - args:
        - -c
        - |
          mc --config-dir /tmp config host add minio "$S3_ENDPOINT" "$S3_ACCESS_KEY_ID" "$S3_SECRET_ACCESS_KEY" &&
          if [ -z "$(mc --config-dir /tmp ls minio | grep "$S3_BUCKET_NAME")" ]; then
            mc --config-dir /tmp mb --with-lock --region "$S3_REGION" minio/"$S3_BUCKET_NAME" &&
            echo "Minio bucket $S3_BUCKET_NAME successfully created."
          fi
        command:
        - /bin/bash
        env:
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              key: aws_access_key_id
              name: tekton-results-s3
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: aws_secret_access_key
              name: tekton-results-s3
        - name: S3_REGION
          valueFrom:
            secretKeyRef:
              key: aws_region
              name: tekton-results-s3
        - name: S3_BUCKET_NAME
          valueFrom:
            secretKeyRef:
              key: bucket
              name: tekton-results-s3
        - name: S3_ENDPOINT
          valueFrom:
            secretKeyRef:
              key: endpoint
              name: tekton-results-s3
        image: quay.io/minio/mc:RELEASE.2023-01-28T20-29-38Z
        imagePullPolicy: Always
        name: mc
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 5m
            memory: 32Mi
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        volumeMounts:
        - mountPath: /etc/ssl/certs/s3-cert.crt
          name: ca-s3
          subPath: s3-cert.crt
        - mountPath: /tmp
          name: tmp-mc-volume
