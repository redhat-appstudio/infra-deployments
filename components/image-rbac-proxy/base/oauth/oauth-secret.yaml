---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oauth-secret-generator
  namespace: image-rbac-proxy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oauth-secret-generator
  namespace: image-rbac-proxy
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - list
  - create
  - get
  - update
  - patch
  - delete
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oauth-secret-generator
  namespace: image-rbac-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oauth-secret-generator
subjects:
- kind: ServiceAccount
  name: oauth-secret-generator
  namespace: image-rbac-proxy
---
apiVersion: batch/v1
kind: Job
metadata:
  name: oauth-secret-generator
  namespace: image-rbac-proxy
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          set -o errexit
          set -o nounset
          set -o pipefail

          echo "Generating/updating image-proxy-client-secret"

          random_pass=$(openssl rand -base64 20)
          kubectl create secret generic image-proxy-client-secret \
              --namespace image-rbac-proxy \
              --from-literal="client-secret=${random_pass}" \
              --dry-run=client \
              -o yaml \
              | kubectl apply -f -

          echo "Restarting the proxy deployment"
          if kubectl -n image-rbac-proxy get deployment/image-rbac-proxy; then
            kubectl -n image-rbac-proxy rollout restart deployment/image-rbac-proxy
          else
            echo "skipping restart"
          fi

          echo "Restarting the dex deployment"
          if kubectl -n image-rbac-proxy get deployment/dex; then
            kubectl -n image-rbac-proxy rollout restart deployment/dex
          else
            echo "skipping dex restart"
          fi

        image: quay.io/konflux-ci/task-runner:955c3525538ea50bf0f562dbd1f0cda330df9054@sha256:1c0582a85dae0949f3ec94aca95695c5d7698b371f1b76c5a78822a6249073dc
        imagePullPolicy: Always
        name: oauth-secret-generator
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 512Mi
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
      dnsPolicy: ClusterFirst
      restartPolicy: Never
      serviceAccountName: oauth-secret-generator
      terminationGracePeriodSeconds: 30
