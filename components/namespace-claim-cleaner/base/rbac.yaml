---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: namespace-claim-cleaner
  namespace: namespace-claim-cleaner
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: namespace-claim-cleaner
rules:
  - apiGroups:
      - toolchain.dev.openshift.com
    resources:
      - namespace-claim
    verbs:
      - list
      - delete
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: namespace-claim-cleaner
subjects:
  - kind: ServiceAccount
    name: namespace-claim-cleaner
    namespace: namespace-claim-cleaner
roleRef:
  kind: ClusterRole
  name: namespace-claim-cleaner
  apiGroup: rbac.authorization.k8s.io
