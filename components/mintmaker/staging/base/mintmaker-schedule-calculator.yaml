apiVersion: batch/v1
kind: CronJob
metadata:
  name: mintmaker-schedule-calculator
  namespace: mintmaker
spec:
  schedule: "0 */4 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            paas.redhat.com/appcode: MINT-001
        spec:
          restartPolicy: Never
          serviceAccountName: mintmaker-schedule-calculator-manager
          containers:
            - name: mintmaker-schedule-calculator
              image: quay.io/konflux-ci/mintmaker-schedule-calculator:latest
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 100m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                  - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1001
