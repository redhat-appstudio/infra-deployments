apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- https://github.com/konflux-ci/mintmaker/config/default?ref=ad50001d2aba01949fd8a1458a3a58a5c4d1391f
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=ad50001d2aba01949fd8a1458a3a58a5c4d1391f

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
  newName: quay.io/konflux-ci/mintmaker
  newTag: ad50001d2aba01949fd8a1458a3a58a5c4d1391f
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: 3972b38a7d692b4ebf92edff400a160ce1ad409d

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

patches:
  - path: manager_patch.yaml
  - target:
      version: v1
      kind: CronJob
      name: create-dependencyupdatecheck
    patch: |-
      - op: add
        path: /spec/jobTemplate/spec/template/spec/containers/0/securityContext/runAsUser
        value: 1001120000
  - target:
      version: v1
      kind: CronJob
      name: delete-dependencyupdatechecks
    patch: |-
      - op: add
        path: /spec/jobTemplate/spec/template/spec/containers/0/securityContext/runAsUser
        value: 1001120000

configurations:
- kustomizeconfig.yaml
