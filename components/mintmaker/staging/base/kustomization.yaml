apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
- pairs:
    paas.redhat.com/appcode: MINT-001
resources:
- ../../base
- ../../base/external-secrets
- ../blackbox
- plrs-resource-quota.yaml
- https://github.com/konflux-ci/mintmaker/config/default?ref=94db51d078bd6bdc26a59b1be14ab9b67f125541
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=94db51d078bd6bdc26a59b1be14ab9b67f125541

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
  newName: quay.io/konflux-ci/mintmaker
  newTag: 94db51d078bd6bdc26a59b1be14ab9b67f125541
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: 1656cfac3125bd5a30c67046fca39d0ed395bbd9

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configMapGenerator:
  - name: controller-config
    files:
    - config.json

patches:
  - path: manager-mount-config-patch.yaml
  - path: manager-set-resources-patch.yaml
  - path: manager-enable-pprof-patch.yaml

configurations:
- kustomizeconfig.yaml

components:
  - ../../components/rh-certs
