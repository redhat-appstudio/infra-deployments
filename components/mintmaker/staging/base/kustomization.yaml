apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- ../blackbox
- https://github.com/konflux-ci/mintmaker/config/default?ref=8cb128eeaf85889f3def106d20bdb1e3b2be1777
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=8cb128eeaf85889f3def106d20bdb1e3b2be1777

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
  newName: quay.io/konflux-ci/mintmaker
  newTag: 8cb128eeaf85889f3def106d20bdb1e3b2be1777
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: dba66e85f9c340ac65a797b4530715bbb3dfeaed

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

patches:
  - path: manager_patch.yaml

configurations:
- kustomizeconfig.yaml

components:
  - ../../components/rh-certs
