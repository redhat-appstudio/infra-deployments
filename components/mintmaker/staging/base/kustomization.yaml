apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
- pairs:
    paas.redhat.com/appcode: MINT-001
resources:
- ../../base
- ../../base/external-secrets
- ../blackbox
- plrs-resource-quota.yaml
- https://github.com/konflux-ci/mintmaker/config/default?ref=628730202a52724d4169c0db68b975f0bd9afe9c
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=628730202a52724d4169c0db68b975f0bd9afe9c

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
  newName: quay.io/konflux-ci/mintmaker
  newTag: 628730202a52724d4169c0db68b975f0bd9afe9c
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: 6695cc041928c99600fb20c695f22aee5e5b4e37

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configMapGenerator:
  - name: controller-config
    files:
    - config.json

patches:
  - path: manager-mount-config-patch.yaml
  - path: manager-set-resources-patch.yaml
  - path: manager-enable-pprof-patch.yaml

configurations:
- kustomizeconfig.yaml

components:
  - ../../components/rh-certs
