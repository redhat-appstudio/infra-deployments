apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- ../blackbox
- https://github.com/konflux-ci/mintmaker/config/default?ref=f4bc27da3d0548bc9fe9112dbc8f109b96acab2f
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=f4bc27da3d0548bc9fe9112dbc8f109b96acab2f

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
  newName: quay.io/konflux-ci/mintmaker
  newTag: f4bc27da3d0548bc9fe9112dbc8f109b96acab2f
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: 77b806adc62ced470c015f66d991e74a21595d59

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

patches:
  - path: manager_patch.yaml

configurations:
- kustomizeconfig.yaml

components:
  - ../../components/rh-certs
