apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- ../blackbox
- https://github.com/konflux-ci/mintmaker/config/default?ref=44db5d9a1ffaac3ce17352662b5d14c27da8b77b
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=44db5d9a1ffaac3ce17352662b5d14c27da8b77b

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
  newName: quay.io/konflux-ci/mintmaker
  newTag: 44db5d9a1ffaac3ce17352662b5d14c27da8b77b
- name: quay.io/konflux-ci/mintmaker-renovate-image
  newName: quay.io/konflux-ci/mintmaker-renovate-image
  newTag: 5a190f1a78e86b97e86f0b41d1c7345d476f432b

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

patches:
  - path: manager_patch.yaml

configurations:
- kustomizeconfig.yaml

components:
  - ../../components/rh-certs
