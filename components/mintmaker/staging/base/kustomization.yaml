apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- https://github.com/konflux-ci/mintmaker/config/default?ref=ed3bffaef417c38ca49d739a00e5ce77505c717e
- https://github.com/konflux-ci/mintmaker/config/renovate?ref=ed3bffaef417c38ca49d739a00e5ce77505c717e

namespace: mintmaker

images:
- name: quay.io/konflux-ci/mintmaker
