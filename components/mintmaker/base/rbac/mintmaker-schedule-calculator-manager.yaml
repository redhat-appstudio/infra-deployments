apiVersion: v1
kind: ServiceAccount
metadata:
  name: mintmaker-schedule-calculator-manager
  namespace: mintmaker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mintmaker-schedule-calculator-manager-role
  namespace: mintmaker
rules:
  - apiGroups:
      - ''
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - cronjobs
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mintmaker-schedule-calculator-manager-rolebinding
  namespace: mintmaker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mintmaker-schedule-calculator-manager-role
subjects:
  - kind: ServiceAccount
    name: mintmaker-schedule-calculator-manager
    namespace: mintmaker
