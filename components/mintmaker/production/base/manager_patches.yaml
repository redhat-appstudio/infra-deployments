apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    metadata:
      annotations:
        # We store the renovate image reference in this annotation to leverage Kustomize's
        # built-in "images" transformer. Kustomize's "images" feature works natively with
        # image references (e.g., container images in spec.containers[].image), but it does
        # not support updating env variables directly, unless we write a new transformer
        # plugin. By storing the image reference here, we can dynamically update it with
        # Kustomize, and the container can access it using 'env[].valueFrom.fieldRef'.
        mintmaker-renovate-image: quay.io/konflux-ci/mintmaker-renovate-image:latest
    spec:
      containers:
      - name: manager
        resources:
          limits:
            cpu: 500m
            memory: 2048Mi
          requests:
            cpu: 100m
            memory: 256Mi
        env:
        - name: RENOVATE_IMAGE
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['mintmaker-renovate-image']
