apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - plrs-resource-quota.yaml
  - https://github.com/konflux-ci/mintmaker/config/default?ref=70cfa98ddf51f87166807d7f2787677422471d20
  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=70cfa98ddf51f87166807d7f2787677422471d20

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
    newTag: 70cfa98ddf51f87166807d7f2787677422471d20
  - name: quay.io/konflux-ci/mintmaker-renovate-image
    newName: quay.io/konflux-ci/mintmaker-renovate-image
    newTag: latest

namespace: mintmaker

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configurations:
- kustomizeconfig.yaml

components:
  - ../components/rh-certs
