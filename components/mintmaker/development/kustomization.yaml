apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
- pairs:
    paas.redhat.com/appcode: MINT-001
resources:
  - ../base
  - plrs-resource-quota.yaml
  - https://github.com/konflux-ci/mintmaker/config/default?ref=afd5757f092a1e6e6cf82be87002d87a2d681fa3
  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=afd5757f092a1e6e6cf82be87002d87a2d681fa3

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
    newTag: afd5757f092a1e6e6cf82be87002d87a2d681fa3
  - name: quay.io/konflux-ci/mintmaker-renovate-image
    newName: quay.io/konflux-ci/mintmaker-renovate-image
    newTag: latest

namespace: mintmaker

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configurations:
- kustomizeconfig.yaml

components:
  - ../components/rh-certs
