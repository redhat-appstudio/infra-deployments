apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - plrs-resource-quota.yaml
  - https://github.com/konflux-ci/mintmaker/config/default?ref=f630842900c1caf0080e113925b3295b6c008df2
  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=f630842900c1caf0080e113925b3295b6c008df2

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
    newTag: f630842900c1caf0080e113925b3295b6c008df2
  - name: quay.io/konflux-ci/mintmaker-renovate-image
    newName: quay.io/konflux-ci/mintmaker-renovate-image
    newTag: latest

namespace: mintmaker

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configurations:
- kustomizeconfig.yaml

components:
  - ../components/rh-certs
