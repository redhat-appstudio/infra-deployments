apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
- pairs:
    paas.redhat.com/appcode: MINT-001
resources:
  - ../base
  - plrs-resource-quota.yaml
  - https://github.com/konflux-ci/mintmaker/config/default?ref=c696e9a16084bd117987416ad70e24da5a5f91d4
  - https://github.com/konflux-ci/mintmaker/config/renovate?ref=c696e9a16084bd117987416ad70e24da5a5f91d4

images:
  - name: quay.io/konflux-ci/mintmaker
    newName: quay.io/konflux-ci/mintmaker
    newTag: c696e9a16084bd117987416ad70e24da5a5f91d4
  - name: quay.io/konflux-ci/mintmaker-renovate-image
    newName: quay.io/konflux-ci/mintmaker-renovate-image
    newTag: latest

namespace: mintmaker

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configurations:
- kustomizeconfig.yaml

components:
  - ../components/rh-certs
