apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../base

patches:
  - path: quaytoken.yaml
    target:
      name: quaytoken
      kind: ExternalSecret
      group: external-secrets.io
      version: v1
  - path: image-pruner-token.yaml
    target:
      name: image-pruner-token
      kind: ExternalSecret
      group: external-secrets.io
      version: v1
