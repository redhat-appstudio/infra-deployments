apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- https://github.com/konflux-ci/image-controller/config/default?ref=67cc74626bb768336d375413d93725d380474417

images:
- name: quay.io/konflux-ci/image-controller
  newName: quay.io/konflux-ci/image-controller
  newTag: 67cc74626bb768336d375413d93725d380474417

namespace: image-controller

patches:
  - path: ./manager_resources_patch.yaml
  - path: quaytoken.yaml
    target:
      name: quaytoken
      kind: ExternalSecret
      group: external-secrets.io
      version: v1
  - path: image-pruner-token.yaml
    target:
      name: image-pruner-token
      kind: ExternalSecret
      group: external-secrets.io
      version: v1
  - path: ./pruner_cronjob_resources_patch.yaml
