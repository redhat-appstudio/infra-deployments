apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../base/external-secrets
- https://github.com/konflux-ci/image-controller/config/default?ref=58b6c424ef356914a960ad29405c51e6b4b1d4f2

images:
- name: quay.io/konflux-ci/image-controller
  newName: quay.io/konflux-ci/image-controller
  newTag: 58b6c424ef356914a960ad29405c51e6b4b1d4f2

namespace: image-controller

patches:
  - path: ./manager_resources_patch.yaml
  - path: quaytoken.yaml
    target:
      name: quaytoken
      kind: ExternalSecret
      group: external-secrets.io
      version: v1
  - path: image-pruner-token.yaml
    target:
      name: image-pruner-token
      kind: ExternalSecret
      group: external-secrets.io
      version: v1
  - path: ./pruner_cronjob_resources_patch.yaml
  - path: ./notification_resetter_cronjob_resources_patch.yaml
