---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.konflux-ci.dev/aggregate-to-maintainer: "true"
  name: konflux-maintainer-snapshots.appstudio.redhat.com
rules:
  - apiGroups:
      - appstudio.redhat.com
    resources:
      - snapshots
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
