---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.konflux-ci.dev/aggregate-to-admin: "true"
  name: konflux-admin-projects.projctl.konflux.dev
rules:
  - apiGroups:
      - projctl.konflux.dev
    resources:
      - projects
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
