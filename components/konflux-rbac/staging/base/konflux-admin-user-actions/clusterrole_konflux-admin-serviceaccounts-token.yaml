---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.konflux-ci.dev/aggregate-to-admin: "true"
  name: konflux-admin-serviceaccounts-token
rules:
  - apiGroups:
      - ""
    resourceNames:
      - konflux-bot-0
      - konflux-bot-1
      - konflux-bot-2
    resources:
      - serviceaccounts/token
    verbs:
      - create
