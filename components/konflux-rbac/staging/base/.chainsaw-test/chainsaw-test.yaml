---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: konflux-user-actions
spec:
  description: |
    checks that the konflux-*-user-actions Aggregated ClusterRoles
    have the expected rules
  concurrent: false
  steps:
  - name: when-clusterroles-are-installed
    try:
    - command:
        entrypoint: kubectl
        args:
        - apply
        - -k
        - ./
        workDir: ../
  # Admin
  - name: then-konflux-admin-user-actions-matches-expectation
    try:
    - assert:
        file: expected-konflux-admin-user-actions.yaml
  # Contributor
  - name: then-konflux-contributor-user-actions-matches-expectation
    try:
    - assert:
        file: expected-konflux-contributor-user-actions.yaml
  - name: then-konflux-contributor-user-actions-does-not-manage-secrets
    try:
    - assert:
        resource:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: konflux-contributor-user-actions
          (rules[?contains(resources, 'secrets')] | length(@) == `0`): true
  # Maintainer
  - name: then-konflux-maintainer-user-actions-matches-expectation
    try:
    - assert:
        file: expected-konflux-maintainer-user-actions.yaml
  - name: then-konflux-maintainer-user-actions-does-not-manage-secrets
    try:
    - assert:
        resource:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: konflux-maintainer-user-actions
          (rules[?contains(resources, 'secrets')] | length(@) == `0`): true
