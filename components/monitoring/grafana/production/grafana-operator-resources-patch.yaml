---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: grafana-operator
  namespace: appstudio-grafana
spec:
  config:
    resources:
      limits:
        cpu: "1000m"
        memory: "1Gi"
      requests:
        cpu: "500m"
        memory: "750Mi"
    env:
      - name: ENABLE_LEADER_ELECTION
        value: "false"
