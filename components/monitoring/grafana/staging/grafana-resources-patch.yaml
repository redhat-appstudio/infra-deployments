---
- op: add
  path: /spec/deployment/spec/template/spec/containers/0
  value:
    name: grafana
    resources:
      requests:
        cpu: "1"
        memory: "4Gi"
      limits:
        cpu: "1"
        memory: "4Gi"
    env:
      - name: GOMEMLIMIT
        valueFrom:
          resourceFieldRef:
            resource: limits.memory
            divisor: "1.25"
