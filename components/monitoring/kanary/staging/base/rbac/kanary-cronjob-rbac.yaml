apiVersion: v1
kind: ServiceAccount
metadata:
  name: kanary-cronjob
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kanary-cronjob-runner
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create", "get"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelines"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kanary-cronjob-runner
subjects:
  - kind: ServiceAccount
    name: kanary-cronjob
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kanary-cronjob-runner
