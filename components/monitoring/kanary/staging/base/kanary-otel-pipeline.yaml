apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: push-kanary-metrics
spec:
  params:
    - name: otel-endpoint
      type: string
      default: http://open-telemetry-opentelemetry-collector.konflux-otel.svc.cluster.local:4318
    - name: tested-cluster
      type: string
      default: stone-stage-p01
    - name: test-type
      type: string
      default: container-single-arch
  steps:
    - name: push-metrics
      image: python:3.12-ubi9
      env:
        - name: OTEL_ENDPOINT
          value: $(params.otel-endpoint)
        - name: TESTED_CLUSTER
          value: $(params.tested-cluster)
        - name: TEST_TYPE
          value: $(params.test-type)
      script: |
        #!/usr/bin/env python3
        import os
        import subprocess
        subprocess.check_call([
            "pip", "install", "--quiet",
            "opentelemetry-api",
            "opentelemetry-sdk",
            "opentelemetry-exporter-otlp-proto-http",
        ])

        from opentelemetry import metrics
        from opentelemetry.sdk.metrics import MeterProvider
        from opentelemetry.sdk.metrics.export import PeriodicExportingMetricReader
        from opentelemetry.exporter.otlp.proto.http.metric_exporter import OTLPMetricExporter
        from opentelemetry.sdk.resources import Resource

        endpoint = os.environ["OTEL_ENDPOINT"] + "/v1/metrics"
        tested_cluster = os.environ["TESTED_CLUSTER"]
        test_type = os.environ["TEST_TYPE"]

        print(f"Pushing kanary metrics to: {endpoint}")
        print(f"  tested_cluster={tested_cluster}, type={test_type}")

        resource = Resource.create({"service.name": "kanary", "service.namespace": "appstudio-kanary-exporter"})
        exporter = OTLPMetricExporter(endpoint=endpoint)
        reader = PeriodicExportingMetricReader(exporter, export_interval_millis=1000)
        provider = MeterProvider(resource=resource, metric_readers=[reader])
        metrics.set_meter_provider(provider)

        meter = metrics.get_meter("kanary")

        labels_up = {"tested_cluster": tested_cluster, "type": test_type}
        labels_error_db = {"tested_cluster": tested_cluster, "type": test_type, "reason": "db_error"}
        labels_error_no_results = {"tested_cluster": tested_cluster, "type": test_type, "reason": "no_test_results"}

        kanary_up = meter.create_gauge("kanary_up_poc", description="POC Kanary signal: 1 if up, 0 if down")
        kanary_error = meter.create_gauge("kanary_error_poc", description="POC Binary indicator of an error in processing for Kanary signal")

        # POC: simulate a healthy state
        kanary_up.set(1, labels_up)
        kanary_error.set(0, labels_error_db)
        kanary_error.set(0, labels_error_no_results)

        print("Recorded: kanary_up_poc=1, kanary_error_poc(db_error)=0, kanary_error_poc(no_test_results)=0")

        provider.force_flush()
        provider.shutdown()
        print("Metrics pushed successfully.")
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: kanary-otel-poc
spec:
  params:
    - name: otel-endpoint
      type: string
      default: http://open-telemetry-opentelemetry-collector.konflux-otel.svc.cluster.local:4318
    - name: tested-cluster
      type: string
      default: stone-stage-p01
    - name: test-type
      type: string
      default: container-single-arch
  tasks:
    - name: push-kanary-metrics
      taskRef:
        name: push-kanary-metrics
      params:
        - name: otel-endpoint
          value: $(params.otel-endpoint)
        - name: tested-cluster
          value: $(params.tested-cluster)
        - name: test-type
          value: $(params.test-type)
