apiVersion: batch/v1
kind: CronJob
metadata:
  name: kanary-trigger-multi-arch
spec:
  schedule: "15,45 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3000
      template:
        spec:
          serviceAccountName: kanary-cronjob
          restartPolicy: Never
          containers:
            - name: trigger
              image: quay.io/openshift-pipeline/openshift-pipelines-cli-tkn:1.15
              securityContext:
                readOnlyRootFilesystem: true
                runAsNonRoot: true
              resources:
                requests:
                  cpu: 100m
                  memory: 10Mi
                limits:
                  cpu: 100m
                  memory: 100Mi
              command:
                - /bin/bash
                - -c
                - |
                  tkn pipeline start kanary-otel-poc --use-param-defaults \
                    --param tested-cluster=kflux-prd-rh02 \
                    --param test-type=container-multi-arch \
                    --param component-repo=https://github.com/rhtap-perf-test/nodejs-devfile-sample3 \
                    --param user-prefix=prdrh02cm \
                    --param quay-repo=redhat-user-workloads \
                    --param pipeline-repo-templating-source=https://github.com/rhtap-perf-test/konflux-probe-test-templates \
                    --param pipeline-repo-templating-source-dir=nodejs-devfile-sample-MultiArch/ \
                    --param release-pipeline-service-account=managed-konflux-perfscale-sa \
                    --param fork-target="" \
                    --param gitlab-api-url="" \
                    --param member-cluster=https://api.kflux-prd-rh02.0fk9.p1.openshiftapps.com:6443 \
                    --prefix-name kanary-kflux-prd-rh02-multi-arch-
