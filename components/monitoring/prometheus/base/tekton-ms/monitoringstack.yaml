apiVersion: monitoring.rhobs/v1alpha1
kind: MonitoringStack
metadata:
  name: appstudio-tekton-ms
  namespace: appstudio-tekton
spec:
  resourceSelector:
    matchLabels:
      monitoring.rhobs/stack: appstudio-tekton-ms
  logLevel: info
  retention: 3h
  alertmanagerConfig:
    disabled: true
  resources:
    requests:
      cpu: 200m
      memory: 8Gi
    limits:
      memory: 8Gi
  prometheusConfig:
    externalLabels: {} # added by overlays (source_cluster, source_environment)
    replicas: 1 # single replica for staging validation; bump to 2 for production HA
    remoteWrite:
    - oauth2:
        clientId:
          secret:
            key: client-id
            name: rhobs
        clientSecret:
          key: client-secret
          name: rhobs
        endpointParams:
          audience: # added by overlays
        tokenUrl: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
      url: # added by overlays
      # writeRelabelConfigs:  # added by overlays
