apiVersion: monitoring.rhobs/v1
kind: ServiceMonitor
metadata:
  name: appstudio-tekton-pipeline-exporter-smon
  namespace: appstudio-tekton
  labels:
    monitoring.rhobs/stack: appstudio-tekton-ms
spec:
  namespaceSelector:
    matchNames:
    - openshift-pipelines
  selector:
    matchLabels:
      app: pipeline-metrics-exporter
  endpoints:
  - port: metrics
    interval: 15s
    honorLabels: true
