apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: konflux-policies
resources:
- namespace.yaml
- taskruns-cluster-policy.yaml
- restrict-docker-io/
# - cost-management/
- konflux-rbac/
- integration/
- kubearchive/
- kueue/
patches:
- patch: |-
    apiVersion: kyverno.io/v1
    kind: ClusterPolicy
    metadata:
      annotations:
        argocd.argoproj.io/sync-options: Replace=true
      name: not-used
  target:
    group: kyverno.io
    kind: ClusterPolicy
- patch: |-
    apiVersion: kyverno.io/v1
    kind: ValidatingPolicy
    metadata:
      annotations:
        argocd.argoproj.io/sync-options: Replace=true
      name: not-used
  target:
    group: kyverno.io
    kind: ValidatingPolicy
