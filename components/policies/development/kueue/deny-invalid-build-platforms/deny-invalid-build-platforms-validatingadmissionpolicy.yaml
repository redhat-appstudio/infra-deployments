---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: deny-invalid-build-platforms.kueue.konflux-ci.dev
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["tekton.dev"]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pipelineruns"]
        scope: "Namespaced"
  validations:
    - expression: "!has(object.metadata.annotations) || !('tekton-kueue.konflux-ci.dev/validation-error' in object.metadata.annotations)"
      message: "PipelineRun rejected: build-platforms parameter must be an array of platform strings, got a non-array value"
