# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: deny-docker-io-image
spec:
  description: |
    Tests that a Pod with an explicit docker.io image is denied.
  concurrent: false
  steps:
  - name: given-cluster-policy-is-ready
    try:
    - apply:
        file: ../restrict-docker-io-cluster-policy.yaml
    - assert:
        file: chainsaw-assert-clusterpolicy.yaml
  - name: then-docker-io-pod-is-denied
    try:
    - create:
        file: resources/pod-bad-docker-io.yaml
        expect:
        - check:
            ($error != null): true
---
