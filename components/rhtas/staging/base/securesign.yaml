---
# Securesign CR — deploys the full RHTAS stack (Fulcio, Rekor, CTlog, TUF, Trillian).
#
# OIDC issuer: verified from the live cluster via:
#   oc get authentication cluster -o jsonpath='{.spec.serviceAccountIssuer}'
#
# Auto-generated resources (no pre-creation needed):
#   - Rekor signing key:  auto-generated when signer.kms defaults to "secret"
#   - ctlog-public-key:   CT log public key
#   - Fulcio root cert:   CA certificate (requires organizationName)
#   - TUF targets:        rekor.pub, ctfe.pub, fulcio_v1.crt.pem
#   - Routes:             fulcio-server, rekor-server, tuf (externalAccess=true)
#
# Post-deployment verification:
#   oc get fulcio -n trusted-artifact-signer -o jsonpath='{.items[0].status.url}'
#   oc get rekor  -n trusted-artifact-signer -o jsonpath='{.items[0].status.url}'
#   oc get tuf    -n trusted-artifact-signer -o jsonpath='{.items[0].status.url}'
#   Confirm these match the external URLs in cluster-config.env.
apiVersion: rhtas.redhat.com/v1alpha1
kind: Securesign
metadata:
  name: securesign-sample
  namespace: trusted-artifact-signer
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"
spec:
  rekor:
    externalAccess:
      enabled: true
  fulcio:
    externalAccess:
      enabled: true
    config:
      OIDCIssuers:
        # Audience "sigstore" — used by rh-sign-image-cosign task (projected SA token)
        - ClientID: "sigstore"
          Issuer: "https://rh-oidc.s3.us-east-1.amazonaws.com/223ugc1f8i6vv1n26c82nut3264t8lvk"
          IssuerURL: "https://rh-oidc.s3.us-east-1.amazonaws.com/223ugc1f8i6vv1n26c82nut3264t8lvk"
          Type: kubernetes
        # Audience "https://kubernetes.default.svc" — used by Tekton Chains default SA token
        - ClientID: "https://kubernetes.default.svc"
          Issuer: "https://rh-oidc.s3.us-east-1.amazonaws.com/223ugc1f8i6vv1n26c82nut3264t8lvk"
          IssuerURL: "https://rh-oidc.s3.us-east-1.amazonaws.com/223ugc1f8i6vv1n26c82nut3264t8lvk"
          Type: kubernetes
    certificate:
      organizationName: "Red Hat"
  ctlog: {}
  tuf:
    externalAccess:
      enabled: true
    keys:
      - name: rekor.pub
      - name: ctfe.pub
      - name: fulcio_v1.crt.pem
  trillian:
    database:
      create: true
