apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base
  - https://github.com/konflux-ci/konflux-ci/operator/config/default?ref=72d73f696e8847edfd53bbf9d302d6f2f703cfef
  - konflux.yaml

namespace: konflux-operator

images:
  - name: localhost/konflux-operator
    newName: quay.io/konflux-ci/konflux-operator
    newTag: 72d73f696e8847edfd53bbf9d302d6f2f703cfef

components:
  - cr/default-tenant
  - cr/build
  - cr/image-controller
  - cr/integration
  - cr/konflux-info
  - cr/konflux-ui
  - cr/namespace-lister
  - cr/release
  - cr/enterprise-contract

patches:
  - path: patches/release-config-patch.yaml
