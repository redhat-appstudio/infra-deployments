apiVersion: konflux.konflux-ci.dev/v1alpha1
kind: Konflux
metadata:
  name: konflux
spec:
  buildService:
    spec:
      pacWebhookInsecureSSL: true
      logEncoder: console
      webhookURLs:
        "https://codeberg.org": "SMEE_CHANNEL_PLACEHOLDER"
      buildControllerManager:
        replicas: 1
        manager:
          env:
            - name: IMAGE_TAG_ON_PR_EXPIRATION
              value: ""
