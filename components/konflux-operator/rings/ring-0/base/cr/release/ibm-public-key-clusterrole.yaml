---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: release-pipeline-ibm-public-key
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - ibm-public-key
      - ibm-public-key-stage
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: release-pipeline-ibm-public-key
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: release-pipeline-ibm-public-key
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:serviceaccounts:release-service
