---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dex
  name: dex
  annotations:
    ignore-check.kube-linter.io/no-anti-affinity: "Using topologySpreadConstraints"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      serviceAccountName: dex
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: dex
      containers:
      - image: quay.io/konflux-ci/dex:latest
        name: dex
        command: ["/usr/local/bin/run-dex.sh"]
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        resources:
          limits:
            cpu: 100m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 256Mi
        ports:
        - name: https
          containerPort: 9443
        - name: telemetry
          containerPort: 5558
          protocol: TCP
        volumeMounts:
        - name: tmp # writeable tmp folder
          mountPath: /tmp
          readOnly: false
        - name: dex-token
          mountPath: /var/run/secrets/konflux-ci.dev/serviceaccount/
        - name: run-dex
          mountPath: /usr/local/bin/run-dex.sh
          subPath: "run-dex.sh"
        - name: dex
          mountPath: /etc/dex/cfg
        - name: tls
          mountPath: /etc/dex/tls
        livenessProbe:
          initialDelaySeconds: 10
          httpGet:
            path: /healthz/ready
            port: telemetry
        readinessProbe:
          initialDelaySeconds: 10
          httpGet:
            path: /healthz/ready
            port: telemetry
        env:
        - name: GODEBUG
          value: "http2server=0"
        - name: TOKEN_PATH
          value: /var/run/secrets/konflux-ci.dev/serviceaccount/token
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        - name: OAUTH2_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-client-secret
              key: client-secret
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
      - name: dex-token
        projected:
          defaultMode: 0440
          sources:
          - serviceAccountToken:
              expirationSeconds: 600
              path: token
      - name: dex
        configMap:
          name: dex
          defaultMode: 420
          items:
          - key: dex-config.yaml
            path: config.yaml
      - name: run-dex
        configMap:
          name: run-dex
          defaultMode: 0755
          items:
          - key: run-dex.sh
            path: run-dex.sh
      - name: tls
        secret:
          secretName: dex-cert
---
apiVersion: v1
kind: Service
metadata:
  name: dex
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: dex-cert
spec:
  type: ClusterIP
  ports:
  - name: dex
    port: 9443
    protocol: TCP
    targetPort: 9443
  selector:
    app: dex
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app: dex
  name: dex
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dex
rules:
- apiGroups: ["dex.coreos.com"] # API group created by dex
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["create"] # To manage its own resources, dex must be able to create customresourcedefinitions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dex
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dex
subjects:
- kind: ServiceAccount
  name: dex           # Service account assigned to the dex pod, created above
  namespace: konflux-ui  # The namespace dex is running in
