apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage-konflux-test
  namespace: konflux-ui
---
apiVersion: v1
kind: Secret
metadata:
  name: backstage-sa-token
  annotations:
    kubernetes.io/service-account.name: "backstage-konflux-test"
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: konflux-backstage-reader
rules:
  - apiGroups:
      - appstudio.redhat.com
    resources:
      - applications
      - components
      - releases
    verbs:
      - list
  - apiGroups:
      - tekton.dev
    resources:
      - pipelineruns
      - taskruns
    verbs:
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: konflux-backstage-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: konflux-backstage-reader
subjects:
  - kind: ServiceAccount
    name: backstage-konflux-test
    namespace: konflux-ui
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: konflux-backstage-impersonator
rules:
  - apiGroups:
      - ''
    resources:
      - groups
    resourceNames:
      - system:authenticated
    verbs:
      - impersonate
  - apiGroups:
      - ''
    resources:
      - users
    verbs:
      - impersonate
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: konflux-backstage-impersonator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: konflux-backstage-impersonator
subjects:
  - kind: ServiceAccount
    name: backstage-konflux-test
    namespace: konflux-ui
