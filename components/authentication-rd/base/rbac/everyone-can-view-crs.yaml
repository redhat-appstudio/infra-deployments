kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: view-appstudio-rd
rules:
- apiGroups:
  - kubearchive.org
  resources:
  - kubearchiveconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - appstudio.redhat.com
  resources:
  - applications
  - buildpipelineselectors
  - componentdetectionqueries
  - components
  - enterprisecontractpolicies
  - environments
  - imagerepositories
  - integrationtestscenarios
  - internalrequests
  - promotionruns
  - releaseplanadmissions
  - releaseplans
  - releases
  - releaseserviceconfigs
  - releasestrategies
  - snapshots
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - jvmbuildservice.io
  resources:
  - artifactbuilds
  - dependencybuilds
  - rebuiltartifacts
  - systemconfigs
  - tektonwrappers
  - jbsconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - pipelinesascode.tekton.dev
  resources:
  - repositories
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - hypershift.openshift.io
  resources:
  - awsendpointservices
  - certificatesigningrequestapprovals
  - hostedclusters
  - hostedcontrolplanes
  - nodepools
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - clustertemplate.openshift.io
  resources:
  - clustertemplates
  - clustertemplateinstances
  - clustertemplatequotas
  - clustertemplatesetups
  - configs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - eaas.konflux-ci.dev
  resources:
  - namespaces
  - xnamespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kubernetes.crossplane.io
  resources:
  - objects
  verbs:
  - get
  - list
  - watch
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: view-cluster-version-rd
rules:
- apiGroups:
  - config.openshift.io
  resources:
  - clusterversions
  verbs:
  - get
  - list
  - watch
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: view-compute-rd
rules:
- apiGroups:
  - ''
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - 'machine.openshift.io'
  resources:
  - machines
  - machinesets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - 'autoscaling.openshift.io'
  resources:
  - machineautoscalers
  verbs:
  - get
  - list
  - watch
  # On EaaS clusters, where Cluster as a service operator is installed, this
  # permission is needed to list the nodes
- apiGroups:
  - certificates.k8s.io
  resources:
  - certificatesigningrequests
  verbs:
  - get
  - watch
  - list
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: everyone-view-rd
subjects: [] # added by patch to avoid duplicating the groups
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: everyone-view-appstudio-rd
subjects: [] # added by patch to avoid duplicating the groups
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view-appstudio-rd
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: everyone-view-cluster-version-rd
subjects: [] # added by patch to avoid duplicating the groups
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view-cluster-version-rd
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: everyone-view-cluster-monitoring-rd
subjects: [] # added by patch to avoid duplicating the groups
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: everyone-view-compute-rd
subjects: [] # added by patch to avoid duplicating the groups
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view-compute-rd
