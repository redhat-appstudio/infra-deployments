---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-checker-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: groups-reader-rd
rules:
- apiGroups:
    - "user.openshift.io"
  resources:
    - "groups"
  verbs:
    - "get"
    - "list"
    - "watch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-checker-group-reader-rd
subjects:
- kind: ServiceAccount
  name: admin-checker-sa
  namespace: admin-checker-rd
roleRef:
  kind: ClusterRole
  name: groups-reader-rd
  apiGroup: rbac.authorization.k8s.io
