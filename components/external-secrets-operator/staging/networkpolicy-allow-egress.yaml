---
# Allow egress to Kubernetes API server and DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-apiserver-dns
  namespace: external-secrets-operator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: external-secrets
      app.kubernetes.io/name: external-secrets
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow access to Kubernetes API server
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-kube-apiserver
    ports:
    - protocol: TCP
      port: 6443
 # Allow communication to the local webhook service
  - to:
    - podSelector:
        matchLabels:
          external-secrets.io/component: webhook # Selects the Webhook pod
    ports:
    - protocol: TCP
      port: 9443 # Default webhook port
 # Allow access to external secret providers (internet egress)
 # This is needed for cloud providers like AWS Secrets Manager, Vault, etc.
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 8200  # Vault default port
  - ipBlock:
      # This CIDR range covers the default Cluster IP (172.30.0.1) in OpenShift/K8s environments.
      cidr: 172.30.0.0/16
  ports:
  - protocol: TCP
    port: 443
---
# Allow webhook egress for cert management
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-egress
  namespace: external-secrets-operator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: external-secrets
      app.kubernetes.io/name: external-secrets-webhook
  policyTypes:
  - Egress
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow API server access
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-kube-apiserver
    ports:
    - protocol: TCP
      port: 6443
  - ipBlock:
      # This CIDR range covers the default Cluster IP (172.30.0.1) in OpenShift/K8s environments.
      cidr: 172.30.0.0/16
  ports:
  - protocol: TCP
    port: 443
---
# Allow cert-controller egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cert-controller-egress
  namespace: external-secrets-operator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: external-secrets
      app.kubernetes.io/name: external-secrets-cert-controller
  policyTypes:
  - Egress
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow API server access
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-kube-apiserver
    ports:
    - protocol: TCP
      port: 6443
  - ipBlock:
      # This CIDR range covers the default Cluster IP (172.30.0.1) in OpenShift/K8s environments.
      cidr: 172.30.0.0/16
  ports:
  - protocol: TCP
    port: 443

