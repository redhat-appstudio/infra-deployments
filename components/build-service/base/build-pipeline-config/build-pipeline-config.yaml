    default-pipeline-name: docker-build-oci-ta
    pipelines:
    - name: fbc-builder
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-fbc-builder:95506e522cb2c1d46f2c8f24e6cf21e3f368d494
      additional-params:
      - build-platforms
    - name: docker-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build:95506e522cb2c1d46f2c8f24e6cf21e3f368d494
    - name: docker-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta:95506e522cb2c1d46f2c8f24e6cf21e3f368d494
    - name: docker-build-multi-platform-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta:95506e522cb2c1d46f2c8f24e6cf21e3f368d494
      additional-params:
      - build-platforms
    - name: maven-zip-build
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build:95506e522cb2c1d46f2c8f24e6cf21e3f368d494
    - name: maven-zip-build-oci-ta
      bundle: quay.io/konflux-ci/tekton-catalog/pipeline-maven-zip-build-oci-ta:95506e522cb2c1d46f2c8f24e6cf21e3f368d494
