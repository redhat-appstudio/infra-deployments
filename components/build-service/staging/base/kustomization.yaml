- ../../base
- ../../base/external-secrets
- https://github.com/konflux-ci/build-service/config/default?ref=514c8a1a08b3dd93cc81052c83de62b7a18b64a5

namespace: build-service

images:
- name: quay.io/konflux-ci/build-service
