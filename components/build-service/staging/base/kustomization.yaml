- ../../base
- ../../base/external-secrets
- https://github.com/konflux-ci/build-service/config/default?ref=cdd5c475cdbc96bb79231df7e42da40ab0e01c26

namespace: build-service

images:
- name: quay.io/konflux-ci/build-service
