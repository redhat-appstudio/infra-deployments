- ../../base
- ../../base/external-secrets
- https://github.com/konflux-ci/build-service/config/default?ref=eaf8ddaccd0bf234b5316d5f0f5feee5bbc88984

namespace: build-service

images:
- name: quay.io/konflux-ci/build-service
