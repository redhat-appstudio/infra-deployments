apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - ../base/external-secrets
  - rbac
  - https://github.com/redhat-appstudio/application-service/config/prometheus/?ref=394a88594f24693304823f9e3fd629695e2e22e0


configMapGenerator:
  - literals:
      - GITHUB_ORG="redhat-appstudio-appdata-staging"
    name: github-config
    behavior: replace
  - literals:
      - ENVIRONMENT="staging"
    name: feature-flag-config
    behavior: replace

namespace: application-service
