# Development: 1 replica so sync does not revert scale-down.
- op: replace
  path: /spec/replicas
  value: 1
- op: replace
  path: /spec/template/spec/containers/0/resources/requests
  value:
    cpu: 500m
    memory: 512Mi
- op: add
  path: /spec/template/spec/containers/0/resources/limits
  value:
    cpu: 500m
    memory: 512Mi
