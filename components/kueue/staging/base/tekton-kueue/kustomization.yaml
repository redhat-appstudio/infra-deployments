apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- https://github.com/konflux-ci/tekton-kueue/config/default?ref=b6c757566c8be810e7dc9c28b207c774a8a8c50d

images:
- name: konflux-ci/tekton-kueue
  newName: quay.io/konflux-ci/tekton-kueue
  newTag: b6c757566c8be810e7dc9c28b207c774a8a8c50d

namespace: tekton-kueue
# ensure that installation starts after the installation of kueue complete
commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"

configMapGenerator:
  - name: tekton-kueue-config
    namespace: tekton-kueue
    behavior: replace
    files:
      - config.yaml

generatorOptions:
  disableNameSuffixHash: true

patches:
  # Development: 1 replica so sync/operator does not revert scale-down (staging/prod use 2+).
  - path: controller-patch.yaml
    target:
      group: apps
      kind: Deployment
      name: tekton-kueue-controller-manager
      version: v1
  - path: webhook-patch.yaml
    target:
      group: apps
      kind: Deployment
      name: tekton-kueue-webhook
      version: v1
  - target:
      kind: Namespace
      name: tekton-kueue
    patch: |-
      - op: add
        path: /metadata/labels/openshift.io~1cluster-monitoring
        value: "true"
