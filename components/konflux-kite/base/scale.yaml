kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: konflux-kite
  namespace: konflux-kite
spec:
  scaleTargetRef:
    kind: Deployment
    name: konflux-kite
    apiVersion: apps/v1
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 30
