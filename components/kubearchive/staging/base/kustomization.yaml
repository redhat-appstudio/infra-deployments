---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../development
  - external-secret.yaml
  - prometheusrule.yaml

patches:
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: kubearchive-logging
        namespace: kubearchive

  - patch: |-
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: vacuum-all
      spec:
        jobTemplate:
          spec:
            template:
              spec:
                containers:
                  - name: vacuum
                    resources:
                      requests:
                        cpu: 100m
                        memory: 1Gi
                      limits:
                        cpu: 100m
                        memory: 1Gi
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: otel-collector
        labels:
          app: otel-collector
      spec:
        template:
          spec:
            containers:
              - name: otel-collector
                image: quay.io/kubearchive/opentelemetry-collector@sha256:1f8c9a186c56f5ab4ffdd937ecce621aef116868f6022f3652c5d285b5788f8a

