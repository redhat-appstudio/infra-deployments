---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../development
  - external-secret.yaml
  - prometheusrule.yaml

patches:
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: kubearchive-logging
        namespace: kubearchive

  - patch: |-
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: vacuum-all
      spec:
        jobTemplate:
          spec:
            template:
              spec:
                containers:
                  - name: vacuum
                    resources:
                      requests:
                        cpu: 100m
                        memory: 1Gi
                      limits:
                        cpu: 100m
                        memory: 1Gi
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: otel-collector
        labels:
          app: otel-collector
      spec:
        template:
          spec:
            containers:
              - name: otel-collector
                image: quay.io/kubearchive/opentelemetry-collector@sha256:74edb825a429b415262e7eb7a99ed77685c9b2b7238ef69fb42a3625df75458f

