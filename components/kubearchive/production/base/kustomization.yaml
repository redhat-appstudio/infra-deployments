---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - database-secret.yaml
  - kubearchive-routes.yaml
  - kubearchive-config.yaml
  - release-vacuum.yaml
  - prometheusrule.yaml

namespace: product-kubearchive

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: otel-collector
        labels:
          app: otel-collector
      spec:
        template:
          spec:
            containers:
              - name: otel-collector
                image: quay.io/kubearchive/opentelemetry-collector@sha256:b17fec48359d78477cfdeb758bb5d71c86ef70e08a6b3944d70d038352211d03