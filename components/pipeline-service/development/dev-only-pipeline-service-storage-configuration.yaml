# Dev-only storage: PostgreSQL for Tekton Results. MinIO is not used in dev (aligns with konflux-ci).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: postgres
  namespace: openshift-gitops
spec:
  destination:
    namespace: tekton-results
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: postgresql
    helm:
      parameters:
      - name: tls.enabled
        value: "true"
      - name: tls.certificatesSecret
        value: postgresql-tls
      - name: tls.certFilename
        value: tls.crt
      - name: tls.certKeyFilename
        value: tls.key
      - name: auth.database
        value: tekton_results
      - name: auth.username
        value: tekton
      - name: auth.existingSecret
        value: tekton-results-database
      - name: auth.secretKeys.userPasswordKey
        value: db.password
      - name: auth.secretKeys.adminPasswordKey
        value: db.password
      - name: primary.resources.requests
        value: "null"
      - name: primary.podSecurityContext.fsGroup
        value: "null"
      - name: primary.podSecurityContext.seccompProfile.type
        value: RuntimeDefault
      - name: primary.containerSecurityContext.runAsUser
        value: "null"
      - name: primary.containerSecurityContext.allowPrivilegeEscalation
        value: "false"
      - name: primary.containerSecurityContext.runAsNonRoot
        value: "true"
      - name: primary.containerSecurityContext.seccompProfile.type
        value: RuntimeDefault
      - name: primary.containerSecurityContext.capabilities.drop[0]
        value: ALL
      - name: volumePermissions.enabled
        value: "false"
      - name: shmVolume.enabled
        value: "false"
      - name: volumePermissions.image.registry
        value: quay.io
      - name: volumePermissions.image.repository
        value: openshift-pipeline/os-shell
      - name: volumePermissions.image.tag
        value: latest
      - name: image.registry
        value: quay.io
      - name: image.repository
        value: openshift-pipeline/postgresql
      - name: image.tag
        value: latest
      - name: global.security.allowInsecureImages
        value: "true"
      releaseName: postgres
    repoURL: registry-1.docker.io/bitnamichartssecure
    targetRevision: 17.0.2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
      limit: -1
    syncOptions:
    - CreateNamespace=false
    - Validate=false
---
apiVersion: v1
type: Opaque
kind: Secret
metadata:
  name: repo-bitnami-postgresql
  namespace: openshift-gitops
  labels:
    argocd.argoproj.io/secret-type: repository
data:
  enableOCI: dHJ1ZQ==
  name: Yml0bmFtaWNoYXJ0c3NlY3VyZQ==
  project: ZGVmYXVsdA==
  type: aGVsbQ==
  url: cmVnaXN0cnktMS5kb2NrZXIuaW8vYml0bmFtaWNoYXJ0c3NlY3VyZQ==
