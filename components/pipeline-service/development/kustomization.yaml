apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Skip applying the Tekton/PaC operands while the Tekton/PaC operator is being installed.
# See more information about this option, here:
# https://argo-cd.readthedocs.io/en/stable/user-guide/sync-options/#skip-dry-run-for-new-custom-resources-types
commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

# Development aligns with konflux-ci: Tekton + PaC without MinIO. Tekton Results uses
# file storage (emptyDir) and PostgreSQL from dev-only storage config. Production and
# staging are unchanged and use S3/MinIO where configured.
resources:
  - main-pipeline-service-configuration.yaml
  - dev-only-pipeline-service-storage-configuration.yaml
  - ../base/rbac

patches:
  # Switch Tekton Results to file storage (no S3/MinIO) for dev (aligns with konflux-ci).
  - target:
      kind: Deployment
      name: tekton-results-api-for-watcher
      namespace: tekton-results
    path: dev-no-minio-for-watcher-patch.yaml
  - target:
      kind: Deployment
      name: tekton-results-api
      namespace: tekton-results
    path: dev-no-minio-api-patch.yaml
