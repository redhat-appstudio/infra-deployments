# JSON patch: tekton-results-api-for-watcher - File storage (no S3/MinIO)
- op: replace
  path: /spec/template/spec/containers/0/env
  value:
    - name: LOGS_API
      value: "true"
    - name: LOGS_TYPE
      value: "File"
    - name: LOGS_PATH
      value: "/logs"
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          key: db.user
          name: tekton-results-database
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          key: db.password
          name: tekton-results-database
    - name: DB_HOST
      valueFrom:
        secretKeyRef:
          key: db.host
          name: tekton-results-database
    - name: DB_NAME
      valueFrom:
        secretKeyRef:
          key: db.name
          name: tekton-results-database
- op: replace
  path: /spec/template/spec/containers/0/volumeMounts
  value:
    - mountPath: /logs
      name: logs
    - mountPath: /etc/tls/db
      name: db-tls-ca
      readOnly: true
    - mountPath: /etc/tekton/results
      name: config
      readOnly: true
    - mountPath: /etc/tls
      name: tls
      readOnly: true
- op: replace
  path: /spec/template/spec/volumes
  value:
    - name: logs
      emptyDir: {}
    - configMap:
        name: rds-root-crt
      name: db-tls-ca
    - configMap:
        name: tekton-results-api-config
      name: config
    - name: tls
      secret:
        secretName: tekton-results-for-watcher-tls
