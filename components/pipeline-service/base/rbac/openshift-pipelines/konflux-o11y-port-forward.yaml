---
# Allow konflux-o11y to use oc port-forward in openshift-pipelines.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: konflux-o11y-port-forward
  namespace: openshift-pipelines
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods/portforward
    verbs:
      - get
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: konflux-o11y-port-forward
  namespace: openshift-pipelines
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: konflux-o11y
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: konflux-o11y-port-forward
