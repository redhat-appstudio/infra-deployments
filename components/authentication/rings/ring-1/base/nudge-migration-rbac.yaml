    konflux-ci.dev/temporary: "STONEINTG-1682 -- remove after nudge-migrate.sh has been run on all clusters"
subjects:
- kind: Group
  apiGroup: rbac.authorization.k8s.io
  name: konflux-integration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nudge-migration
