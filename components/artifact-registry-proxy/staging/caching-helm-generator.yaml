apiVersion: builtin
kind: HelmChartInflationGenerator
metadata:
  name: caching-helm
name: caching-helm
repo: oci://quay.io/konflux-ci/caching
version: 0.1.1688+a7def07
valuesInline:
  squid:
    enabled: false
  nginx:
    enabled: true
    replicaCount: 3
    name: artifact-registry-proxy-v2
    tls:
      enabled: true
      secretName: artifact-registry-proxy-v2-tls
    service:
      port: 443
      trafficDistribution: PreferClose
      annotations:
        service.beta.openshift.io/serving-cert-secret-name: artifact-registry-proxy-v2-tls
    upstream:
      url: https://red-hat.repo.sonatype.app
    auth:
      enabled: true
      secretName: artifact-registry-credentials
    cache:
      allowList:
        # Cache all traffic to nexus repositories
        - ^/repository/
      size: 102400
      ttl: 30d
    resources:
      requests:
        cpu: "2"
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 2Gi
  installCertManagerComponents: false
  mirrord:
    enabled: false
  test:
    enabled: false
  cert-manager:
    enabled: false
  environment: release
  prometheus:
    serviceMonitor:
      nginxTLS:
        ca:
          configMapName: openshift-service-ca.crt
          key: service-ca.crt
  tlsOutgoingOptions:
    caFile: /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem
  volumes:
    - name: trusted-ca
      configMap:
        name: trusted-ca
        items:
          - key: ca-bundle.crt
            path: tls-ca-bundle.pem
  volumeMounts:
    - name: trusted-ca
      mountPath: /etc/pki/ca-trust/extracted/pem
      readOnly: true
