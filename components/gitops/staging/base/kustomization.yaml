apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- https://github.com/redhat-appstudio/managed-gitops/manifests/overlays/stonesoup-member-cluster?ref=d212feec70d01a2f78fc1e64bf8ce2a7b36dca88
- ../../openshift-gitops/overlays/staging
- ../../base/external-secrets
- ../../base/monitoring
- authentication

images:
  - name: \${COMMON_IMAGE}
    newName: quay.io/redhat-appstudio/gitops-service
    newTag: d212feec70d01a2f78fc1e64bf8ce2a7b36dca88

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
