apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- https://github.com/redhat-appstudio/managed-gitops/manifests/overlays/stonesoup-member-cluster?ref=153d0aed1373d29ede1aafa0f0801227f6b16db1
- ../../openshift-gitops/overlays/staging
- ../../base/external-secrets
- ../../base/monitoring
- authentication

images:
  - name: \${COMMON_IMAGE}
    newName: quay.io/redhat-appstudio/gitops-service
    newTag: 153d0aed1373d29ede1aafa0f0801227f6b16db1

commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
