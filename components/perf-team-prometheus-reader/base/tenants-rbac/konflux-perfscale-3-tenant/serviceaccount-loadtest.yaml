---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: serviceaccount-loadtest
  namespace: konflux-perfscale-3-tenant
secrets:
  - name: rhtap-perf-test-oci-storage-robot-pull-secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: serviceaccount-loadtest-rolebinding
  namespace: konflux-perfscale-3-tenant
subjects:
  - kind: ServiceAccount
    apiGroup: ""
    name: serviceaccount-loadtest
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: konflux-admin-user-actions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: serviceaccounttoken-manager
  namespace: konflux-perfscale-3-tenant
rules:
- apiGroups:
  - ""
  resources:
  - serviceaccounts/token
  resourceNames:
  - serviceaccount-loadtest
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: serviceaccounttoken-manager:konflux-perfscale
  namespace: konflux-perfscale-3-tenant
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: serviceaccounttoken-manager
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: konflux-performance
