# To generate a token: oc -n perf-team-prometheus-reader create token perf-team-prometheus-reader-cluster-sa --duration "$((24*365))h"
# Store the token in https://vault.devshift.net/ stonesoup /{staging,production}/perfscale/shared/<cluster>
apiVersion: v1
kind: ServiceAccount
metadata:
  name: perf-team-prometheus-reader-cluster-sa
  namespace: perf-team-prometheus-reader
---
# Grant permission to Federate In-Cluster Prometheus
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sa-read-permissions-openshift-monitoring
subjects:
- kind: ServiceAccount
  name: perf-team-prometheus-reader-cluster-sa
  namespace: perf-team-prometheus-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
