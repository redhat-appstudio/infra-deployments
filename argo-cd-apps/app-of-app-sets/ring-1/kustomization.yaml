apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  - path: patches/source-path-patch.yaml
    target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
  - path: patches/name-patch.yaml
    target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
      name: all-application-sets
namespace: argocd-staging
