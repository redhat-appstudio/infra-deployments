apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  - path: patches/source-path-patch.yaml
    target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
  - path: patches/argocd-namespace-patch.yaml
    target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
      name: all-application-sets
  # Must be the last patch since it patches the name of the application
  - path: patches/name-patch.yaml
    target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
      name: all-application-sets

namespace: argocd-infra-deployments
