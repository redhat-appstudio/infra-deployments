apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd-infra-deployments

resources:
  - authentication
  - etcd-shield

patches:
  - path: patches/all-clusters-patch.yaml
    target:
      kind: ApplicationSet
      version: v1alpha1
      labelSelector: appstudio.redhat.com/environment=all
  - path: patches/external-clusters-patch.yaml
    target:
      kind: ApplicationSet
      version: v1alpha1
      labelSelector: appstudio.redhat.com/environment=external
  - path: patches/internal-clusters-patch.yaml
    target:
      kind: ApplicationSet
      version: v1alpha1
      labelSelector: appstudio.redhat.com/environment=internal
  - path: patches/member-clusters-patch.yaml
    target:
      kind: ApplicationSet
      version: v1alpha1
      labelSelector: appstudio.redhat.com/environment=member
