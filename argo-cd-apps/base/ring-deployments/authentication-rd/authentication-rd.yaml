apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: authentication-rd
spec:
  generators:
    - merge:
        mergeKeys:
          - nameNormalized
        generators:
          - clusters:
              values:
                sourceRoot: components/authentication-rd
                ring: "ring-0"
                clusterDir: base
          - list:
              elements:
                - values.ring: ring-1
                  nameNormalized: stone-stage-p01
                  values.clusterDir: stone-stage-p01
  template:
    metadata:
      name: authentication-rd-{{nameNormalized}}
    spec:
      project: default
      source:
        path: '{{values.sourceRoot}}/rings/{{values.ring}}/{{values.clusterDir}}'
        repoURL: https://github.com/redhat-appstudio/infra-deployments.git
        targetRevision: main
      destination:
        namespace: authentication
        server: '{{server}}'
      syncPolicy:
        # automated:
        #   prune: true
        #   selfHeal: true
        syncOptions:
        - CreateNamespace=true
        retry:
          limit: 50
          backoff:
            duration: 15s
