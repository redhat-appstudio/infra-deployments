apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: k8s-groups
spec:
  generators:
    - merge:
        mergeKeys:
          - nameNormalized
        generators:
          - clusters:
              values:
                sourceRoot: components/k8s-groups
                environment: staging
                useCaseDir: rover
          - list:
              elements: []
  template:
    metadata:
      name: k8s-groups-{{nameNormalized}}
    spec:
      project: default
      source:
        path: '{{values.sourceRoot}}/{{values.environment}}/{{values.useCaseDir}}'
        repoURL: https://github.com/redhat-appstudio/internal-infra-deployments.git
        targetRevision: main
      destination:
        namespace: k8s-groups
        server: '{{server}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: -1
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
