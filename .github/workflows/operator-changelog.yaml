name: Operator Changelog

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'components/konflux-operator/rings/*/base/invariant/kustomization.yaml'

jobs:
  changelog:
    runs-on: ubuntu-latest
    concurrency:
      group: operator-changelog-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      pull-requests: write
      contents: read
    steps:
      # Check out the BASE branch with full history (trusted code only).
      # fetch-depth: 0 is required so git worktree can check out the base SHA.
      # The binary is built here before we touch any PR-provided file content.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # hash v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: infra-tools/go.mod
          cache-dependency-path: infra-tools/go.sum

      - name: Build changelog-generator
        working-directory: infra-tools
        run: go build -o bin/changelog-generator ./cmd/changelog-generator

      # Switch the workspace to the PR merge ref so headPath reads the PR's
      # kustomization.yaml. The binary was already built from trusted base-branch
      # code above, so checking out PR content here is safe.
      - name: Checkout PR merge ref
        id: fetch-merge
        continue-on-error: true
        run: |
          git fetch origin refs/pull/${{ github.event.pull_request.number }}/merge
          git checkout FETCH_HEAD

      - name: Warn about required PR rebase
        if: ${{ always() && steps.fetch-merge.outcome == 'failure' }}
        run: |
          echo "ERROR: This PR has merge conflicts — please rebase before the changelog can be generated."
          exit 1

      - name: Detect changed ring kustomizations
        if: steps.fetch-merge.outcome == 'success'
        id: detect-rings
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD -- \
            'components/konflux-operator/rings/*/base/invariant/kustomization.yaml')
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run changelog-generator
        if: steps.fetch-merge.outcome == 'success' && steps.detect-rings.outputs.paths != ''
        working-directory: infra-tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CHANGED_PATHS: ${{ steps.detect-rings.outputs.paths }}
        run: |
          while IFS= read -r kust_path; do
            [ -z "$kust_path" ] && continue
            echo "::group::Changelog for $kust_path"
            ./bin/changelog-generator \
              --repo-root=.. \
              --base-ref="$BASE_SHA" \
              --kustomization-path="$kust_path"
            echo "::endgroup::"
          done <<< "$CHANGED_PATHS"
