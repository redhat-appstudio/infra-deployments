version: "2"
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - durationcheck
    - errchkjson
    - errorlint
    - exhaustive
    - fatcontext
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecksumtype
    - gosec
    - gosmopolitan
    - loggercheck
    - makezero
    - musttag
    - nilerr
    - nilnesserr
    - noctx
    - perfsprint
    - prealloc
    - protogetter
    - reassign
    - recvcheck
    - rowserrcheck
    - spancheck
    - sqlclosecheck
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - usetesting
    - zerologlint
  disable:
    - exhaustruct
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # govet composites check is noisy for struct literals with unkeyed fields
      - linters: [govet]
        text: composites
      # Allow dot imports in tests (Ginkgo/Gomega DSL)
      - linters: [staticcheck]
        path: _test\.go$
        text: "ST1001:"
formatters:
  exclusions:
    generated: lax
